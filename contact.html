<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact - Jerard Francis B. Macandog</title>
        <link rel="stylesheet" href="website.css">
    </head>
    <body>
        <header class="top-bar">
            <div class="brand-name"><a href="index.html">Jerard Francis B. Macandog</a></div>
            <div class="dropdown">
                <details>
                    <summary>Menu</summary>
                    <div class="dropdown-menu">
                        <a href="index.html">Home</a>
                        <a href="about.html">About Me</a>
                        <a href="skills.html">Skills</a>
                        <a href="projects.html">Projects</a>
                        <a href="capstone.html">Capstone</a>
                        <a href="cv.html">Curriculum Vitae</a>
                        <a href="contact.html">Contact</a>
                    </div>
                </details>
            </div>
        </header>

        <main class="page-wrapper">
            <section class="section-card">
                <h2>Contact</h2>
                <p>Connect with me or send a message using the form.</p>

                <div class="contact-container">
                    <div class="contact-boxes">
                        <div class="contact-box facebook-box">
                            <img src="images/facebook.png" alt="Facebook" class="contact-icon">
                            <div class="contact-title">Facebook</div>
                            <a class="contact-link" href="https://www.facebook.com/jerardmcndg" target="_blank" rel="noreferrer">/jerardmcndg</a>
                        </div>

                        <div class="contact-box gmail-box">
                            <img src="images/gmail.png" alt="Gmail" class="contact-icon">
                            <div class="contact-title">Gmail</div>
                            <a class="contact-link" href="mailto:jfrancismac23@gmail.com">jfrancismac23@gmail.com</a>
                        </div>

                        <div class="contact-box linkedin-box">
                            <img src="images/link.png" alt="LinkedIn" class="contact-icon">
                            <div class="contact-title">LinkedIn</div>
                            <a class="contact-link" href="https://www.linkedin.com/in/francis-macandog-78793b335/" target="_blank" rel="noreferrer">francis-macandog-78793b335</a>
                        </div>
                    </div>

                    <div class="contact-form">
                        <h3>Contact Us</h3>
                        <form id="contactForm" action="#" method="post">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Enter your name" required>

                            <label for="email">Gmail</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>

                            <label for="phone">Contact Number</label>
                            <input type="text" id="phone" name="phone" placeholder="Enter your phone or contact number">

                            <label for="concern">Concern</label>
                            <textarea id="concern" name="concern" rows="5" placeholder="Write your concern or message here" required></textarea>

                            <button type="submit" class="btn-submit">Submit</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <footer class="social-footer">
            <a href="https://www.facebook.com/jerardmcndg" target="_blank" rel="noreferrer">Facebook</a>
            <a href="https://www.linkedin.com/in/francis-macandog-78793b335/" target="_blank" rel="noreferrer">LinkedIn</a>
        </footer>

        <script>
            document.getElementById('contactForm').addEventListener('submit', function(event) {
                event.preventDefault();

                var name = encodeURIComponent(document.getElementById('name').value.trim());
                var email = encodeURIComponent(document.getElementById('email').value.trim());
                var phone = encodeURIComponent(document.getElementById('phone').value.trim());
                var concern = encodeURIComponent(document.getElementById('concern').value.trim());

                var subject = encodeURIComponent('Contact Form Submission from ' + name);
                var body = encodeURIComponent(
                    'Name: ' + name + '\n' +
                    'Email: ' + email + '\n' +
                    'Contact Number: ' + phone + '\n\n' +
                    'Concern:\n' + concern
                );

                var mailtoUrl = 'mailto:jfrancismac23@gmail.com?subject=' + subject + '&body=' + body;
                window.location.href = mailtoUrl;
            });
        </script>
    </body>
</html>
